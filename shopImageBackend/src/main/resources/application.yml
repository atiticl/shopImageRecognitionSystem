server:
  port: 8080

spring:
  application:
    name: shop-image-backend
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:mysql://localhost:3306/shop_image?useSSL=false&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: redis
  data:
    redis:
      host: 114.66.57.6
      port: 6379
      password:
      database: 2
  rabbitmq:
    host: 8.130.54.192
    port: 5672
    username: admin
    password: admin123456
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

minio:
  endpoint: http://8.130.54.192:9000
  access-key: admin
  secret-key: admin123456
  bucket: shop-images

# AI 分类映射配置：ONNX输出索引 -> 数据库类目ID
ai:
  outputIndexToCategory: "0=4,1=1,2=3" # 0->裤子(4), 1->鞋子(1), 2->上衣(3)

logging:
  level:
    root: info
    org.springframework.web: info
    com.shopimage: debug
    nu.pattern.OpenCV: WARN # 降低OpenCV警告级别

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
