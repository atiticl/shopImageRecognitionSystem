version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: shopimage-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=shop_image
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command:
      [
        "mysqld",
        "--default-authentication-plugin=mysql_native_password",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_general_ci",
      ]

  backend:
    build: .
    container_name: shopimage-backend
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/shop_image?useSSL=false&characterEncoding=utf8&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8080:8080"

volumes:
  db_data:
