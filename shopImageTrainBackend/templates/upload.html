<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品智能识别分类管理员训练系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态渐变背景动画 */
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 添加简约几何背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            animation: floatParticles 25s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes floatParticles {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-10px) rotate(180deg);
                opacity: 0.6;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
            padding: 30px;
            border-radius: 10px;
            background: #f8f9fa;
            border-left: 5px solid #4facfe;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 400;
        }

        .upload-area {
            border: 3px dashed #4facfe;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #00f2fe;
            background: #f0f8ff;
        }

        .upload-area.dragover {
            border-color: #00f2fe;
            background: #e6f3ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #4facfe;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .result-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #4facfe;
        }

        .error {
            color: #e74c3c;
            background: #ffeaea;
            border-left-color: #e74c3c;
        }

        .success {
            color: #27ae60;
            background: #eafaf1;
            border-left-color: #27ae60;
        }

        .info {
            color: #3498db;
            background: #eaf4fd;
            border-left-color: #3498db;
        }

        .model-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .model-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .model-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .model-info {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .predict-result {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .confidence-bar {
            width: 100px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .model-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>商品智能识别分类管理员训练系统</h1>
            <p>基于YOLOv8的商品图像识别与分类训练平台</p>
        </div>

        <div class="main-content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('upload')">数据集上传</div>
                <div class="tab" onclick="switchTab('train')">模型训练</div>
                <div class="tab" onclick="switchTab('predict')">图像预测</div>
                <div class="tab" onclick="switchTab('models')">模型管理</div>
            </div>

            <!-- 数据集上传 -->
            <div id="upload-tab" class="tab-content active">
                <div class="section">
                    <h2>📁 上传数据集</h2>
                    <div class="upload-area" onclick="document.getElementById('dataset-file').click()">
                        <div class="upload-icon">📦</div>
                        <div class="upload-text">点击或拖拽上传数据集压缩包</div>
                        <div class="upload-hint">支持 ZIP 格式，最大 500MB</div>
                    </div>
                    <input type="file" id="dataset-file" class="file-input" accept=".zip" onchange="uploadDataset(this)">
                    
                    <div class="progress-container" id="upload-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="upload-progress-fill"></div>
                        </div>
                        <div class="progress-text" id="upload-progress-text">上传中...</div>
                    </div>
                    
                    <div class="result-area" id="upload-result"></div>
                </div>
            </div>

            <!-- 模型训练 -->
            <div id="train-tab" class="tab-content">
                <div class="section">
                    <h2>🚀 模型训练</h2>
                    <div style="margin-bottom: 20px;">
                        <label>训练轮数 (Epochs):</label>
                        <input type="number" id="epochs" value="50" min="10" max="200" style="margin-left: 10px; padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>批次大小 (Batch Size):</label>
                        <input type="number" id="batch-size" value="8" min="1" max="32" style="margin-left: 10px; padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
                    </div>
                    <button class="btn" onclick="startTraining()" id="train-btn">开始训练</button>
                    
                    <div class="progress-container" id="train-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="train-progress-fill"></div>
                        </div>
                        <div class="progress-text" id="train-progress-text">准备训练...</div>
                    </div>
                    
                    <div class="result-area" id="train-result"></div>
                </div>
            </div>

            <!-- 图像预测 -->
            <div id="predict-tab" class="tab-content">
                <div class="section">
                    <h2>🔍 图像预测</h2>
                    <div class="upload-area" onclick="document.getElementById('predict-file').click()">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-text">点击上传要预测的图片</div>
                        <div class="upload-hint">支持 JPG, PNG 格式</div>
                    </div>
                    <input type="file" id="predict-file" class="file-input" accept="image/*" onchange="predictImage(this)">
                    
                    <div class="result-area" id="predict-result"></div>
                </div>
            </div>

            <!-- 模型管理 -->
            <div id="models-tab" class="tab-content">
                <div class="section">
                    <h2>📊 模型管理</h2>
                    <button class="btn" onclick="loadModels()">刷新模型列表</button>
                    <div class="model-list" id="model-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabName) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 移除所有标签的激活状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // 激活选中的标签
            event.target.classList.add('active');
            
            // 如果切换到模型管理页面，自动加载模型列表
            if (tabName === 'models') {
                loadModels();
            }
        }

        // 上传数据集
        function uploadDataset(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            const progressContainer = document.getElementById('upload-progress');
            const progressFill = document.getElementById('upload-progress-fill');
            const progressText = document.getElementById('upload-progress-text');
            const resultArea = document.getElementById('upload-result');

            progressContainer.style.display = 'block';
            resultArea.style.display = 'none';

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                progressContainer.style.display = 'none';
                resultArea.style.display = 'block';
                
                if (data.error) {
                    resultArea.innerHTML = `<div class="result-item error">❌ ${data.error}</div>`;
                } else {
                    resultArea.innerHTML = `<div class="result-item success">✅ ${data.message}</div>`;
                    
                    // 自动解压数据集
                    extractDataset(data.filepath);
                }
            })
            .catch(error => {
                progressContainer.style.display = 'none';
                resultArea.style.display = 'block';
                resultArea.innerHTML = `<div class="result-item error">❌ 上传失败: ${error.message}</div>`;
            });
        }

        // 解压数据集
        function extractDataset(filepath) {
            fetch('/api/extract_dataset', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ filepath: filepath })
            })
            .then(response => response.json())
            .then(data => {
                const resultArea = document.getElementById('upload-result');
                
                if (data.error) {
                    resultArea.innerHTML += `<div class="result-item error">❌ ${data.error}</div>`;
                } else {
                    let classInfo = data.classes.map(cls => `${cls.name}: ${cls.image_count}张图片`).join('<br>');
                    resultArea.innerHTML += `
                        <div class="result-item success">✅ 数据集解压成功</div>
                        <div class="result-item info">📊 发现类别:<br>${classInfo}</div>
                    `;
                }
            })
            .catch(error => {
                const resultArea = document.getElementById('upload-result');
                resultArea.innerHTML += `<div class="result-item error">❌ 解压失败: ${error.message}</div>`;
            });
        }

        // 开始训练
        function startTraining() {
            const epochs = document.getElementById('epochs').value;
            const batchSize = document.getElementById('batch-size').value;
            const trainBtn = document.getElementById('train-btn');
            const progressContainer = document.getElementById('train-progress');
            const resultArea = document.getElementById('train-result');

            trainBtn.disabled = true;
            trainBtn.textContent = '训练中...';
            progressContainer.style.display = 'block';
            resultArea.style.display = 'none';

            fetch('/api/start_training', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    epochs: parseInt(epochs),
                    batch_size: parseInt(batchSize)
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    trainBtn.disabled = false;
                    trainBtn.textContent = '开始训练';
                    progressContainer.style.display = 'none';
                    resultArea.style.display = 'block';
                    resultArea.innerHTML = `<div class="result-item error">❌ ${data.error}</div>`;
                } else {
                    // 开始轮询训练状态
                    pollTrainingStatus();
                }
            })
            .catch(error => {
                trainBtn.disabled = false;
                trainBtn.textContent = '开始训练';
                progressContainer.style.display = 'none';
                resultArea.style.display = 'block';
                resultArea.innerHTML = `<div class="result-item error">❌ 启动训练失败: ${error.message}</div>`;
            });
        }

        // 轮询训练状态
        function pollTrainingStatus() {
            const interval = setInterval(() => {
                fetch('/api/training_status')
                .then(response => response.json())
                .then(data => {
                    const progressFill = document.getElementById('train-progress-fill');
                    const progressText = document.getElementById('train-progress-text');
                    const trainBtn = document.getElementById('train-btn');
                    const resultArea = document.getElementById('train-result');

                    progressFill.style.width = data.progress + '%';
                    progressText.textContent = data.message;

                    if (!data.is_training) {
                        clearInterval(interval);
                        trainBtn.disabled = false;
                        trainBtn.textContent = '开始训练';
                        
                        resultArea.style.display = 'block';
                        if (data.model_path) {
                            resultArea.innerHTML = `
                                <div class="result-item success">✅ ${data.message}</div>
                                <div class="result-item info">📁 模型保存路径: ${data.model_path}</div>
                            `;
                        } else {
                            resultArea.innerHTML = `<div class="result-item error">❌ ${data.message}</div>`;
                        }
                    }
                })
                .catch(error => {
                    clearInterval(interval);
                    console.error('获取训练状态失败:', error);
                });
            }, 2000);
        }

        // 预测图像
        function predictImage(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            const resultArea = document.getElementById('predict-result');
            resultArea.style.display = 'block';
            resultArea.innerHTML = '<div class="result-item info">🔄 正在预测...</div>';

            fetch('/api/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultArea.innerHTML = `<div class="result-item error">❌ ${data.error}</div>`;
                } else {
                    let predictionsHtml = '';
                    if (data.result.predictions.length === 0) {
                        predictionsHtml = '<div class="result-item info">ℹ️ 未检测到商品</div>';
                    } else {
                        predictionsHtml = '<div class="predict-result"><h3>预测结果:</h3>';
                        data.result.predictions.forEach((pred, index) => {
                            const confidence = (pred.confidence * 100).toFixed(1);
                            predictionsHtml += `
                                <div class="prediction-item">
                                    <span><strong>${pred.class_name}</strong></span>
                                    <div>
                                        <span>${confidence}%</span>
                                        <div class="confidence-bar">
                                            <div class="confidence-fill" style="width: ${confidence}%"></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        predictionsHtml += '</div>';
                    }
                    
                    resultArea.innerHTML = `
                        <div class="result-item success">✅ 预测完成</div>
                        <div class="result-item info">🤖 使用模型: ${data.model_used}</div>
                        ${predictionsHtml}
                    `;
                }
            })
            .catch(error => {
                resultArea.innerHTML = `<div class="result-item error">❌ 预测失败: ${error.message}</div>`;
            });
        }

        // 加载模型列表
        function loadModels() {
            const modelList = document.getElementById('model-list');
            modelList.innerHTML = '<div class="result-item info">🔄 加载中...</div>';

            fetch('/api/models')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    modelList.innerHTML = `<div class="result-item error">❌ ${data.error}</div>`;
                } else if (data.models.length === 0) {
                    modelList.innerHTML = '<div class="result-item info">ℹ️ 暂无训练好的模型</div>';
                } else {
                    let modelsHtml = '';
                    data.models.forEach(model => {
                        const size = (model.size / 1024 / 1024).toFixed(2);
                        const date = new Date(model.created_time).toLocaleString();
                        modelsHtml += `
                            <div class="model-card">
                                <div class="model-name">📊 ${model.name}</div>
                                <div class="model-info">
                                    📁 大小: ${size} MB<br>
                                    📅 创建时间: ${date}
                                </div>
                                <button class="btn" onclick="downloadModel('${model.name}')">下载模型</button>
                            </div>
                        `;
                    });
                    modelList.innerHTML = modelsHtml;
                }
            })
            .catch(error => {
                modelList.innerHTML = `<div class="result-item error">❌ 加载失败: ${error.message}</div>`;
            });
        }

        // 下载模型
        function downloadModel(modelName) {
            window.open(`/api/download_model/${modelName}`, '_blank');
        }

        // 拖拽上传功能
        document.addEventListener('DOMContentLoaded', function() {
            const uploadAreas = document.querySelectorAll('.upload-area');
            
            uploadAreas.forEach(area => {
                area.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('dragover');
                });
                
                area.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                });
                
                area.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                    
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const fileInput = this.parentElement.querySelector('.file-input');
                        fileInput.files = files;
                        fileInput.dispatchEvent(new Event('change'));
                    }
                });
            });
        });
    </script>
</body>
</html>
